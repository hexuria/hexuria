name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Test (integration, requires Postgres)
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: cargo test -p payplan_infra --features integration -- --include-ignored --test-threads=1

  build:
    name: release server + islands build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-leptos
        run: cargo install --locked cargo-leptos --version 0.3.6
      - name: Build release server and precompressed islands assets
        run: cargo leptos build --release --precompress
      - name: Enforce hydrate dependency boundary
        run: |
          cargo tree -p payplan_ui --target wasm32-unknown-unknown \
            --no-default-features --features hydrate > hydrate-tree.txt
          if grep -E '(^| )((axum|sqlx|tokio|payplan_infra|payplan_web|leptos_axum|leptos_router)) v' hydrate-tree.txt; then
            echo "server dependency entered the hydrate graph"
            exit 1
          fi
      - name: Enforce WASM size budget
        run: |
          wasm="$(find target/site/pkg -maxdepth 1 -name '*.wasm' -print -quit)"
          test -n "$wasm"
          raw_size="$(stat -c%s "$wasm")"
          gzip_size="$(stat -c%s "$wasm.gz")"
          echo "WASM raw bytes: $raw_size"
          echo "WASM gzip bytes: $gzip_size"
          test "$raw_size" -le 307200
          test "$gzip_size" -le 122880
      - name: Record release asset baseline
        run: bash scripts/ui-asset-baseline.sh | tee ui-asset-baseline.json
      - name: Upload release asset baseline
        uses: actions/upload-artifact@v4
        with:
          name: payplan-ui-asset-baseline
          path: ui-asset-baseline.json
